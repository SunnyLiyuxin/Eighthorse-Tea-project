# 预置输出（阶段一 LLM 代理 + seed 兜底）
# 三款茶 × 两条链（国内 + 跨文化）× 物料（中文 + 英文）
# 跨文化表达 source_expression_id 指向国内表达（横向翻译派生，不进纵向链）

expressions:
  # ===== 赛珍珠铁观音——国内表达 =====
  - id: expr_cn_szz_tgy_nx
    tea_id: BAMA_SZZ_TGY_NX
    expression_type: domestic
    strategy_id: strategy_domestic_store_sales
    audience:
      age_group: gen_z
      knowledge_level: beginner
      scenario: self_drinking
      psychology: curiosity
    outputs:
      story_style: "赛珍珠的铁观音值得用三种香气来理解：先闻干茶，是温暖的炒米香；再闻茶汤，是果甜香飘出来；入口后，兰花香才慢慢展开。三香层层递进，不是一次全给你。"
      scientific_style: "浓香型铁观音的'三香'来自做青和焙火共同作用。同类铁观音研究显示，橙花叔醇、茉莉内酯等挥发物可能参与花香和果甜香的形成。当前成分解释基于品类研究，不是赛珍珠单品的检测值。"
      emotional_style: "下午泡一杯赛珍珠，第一口是炒米的温暖感，慢慢花香透出来，喝完喉咙里甜感又重新浮现。这就是铁观音迷人的地方——它不会一次把答案全告诉你。"
    source_profile_id: flavor_szz_tgy_nx
    trace_id: expr_cn_szz_tgy_nx
    source_expression_id: null

  # ===== 赛珍珠（新ID）——跨文化表达 =====
  - id: expr_en_szz_tgy_nx_coffee
    tea_id: BAMA_SZZ_TGY_NX
    expression_type: cross_cultural
    strategy_id: strategy_cross_cultural_coffee
    target_language: en
    market: western
    audience_reference: specialty_coffee_lovers
    outputs:
      literal_explanation: "Saizhenzhu is Bama Tea's flagship Tieguanyin — a roasted oolong with toasted-rice warmth, a fruity-sweet lift in the aroma, and an orchid-like floral note that unfolds on the palate."
      beginner_analogy: "Think of the contrast in a carefully roasted coffee: warm toasted notes first, then a cleaner floral finish — but with the lighter body and long hui gan (returning sweetness) of oolong tea."
      cultural_narrative: "Its defining character is called Guanyin Yun. It is not a single aroma, but the lingering unity of the Tieguanyin cultivar, Anxi terroir, traditional craft and aftertaste. The three-aroma progression — toasted rice, fruity sweetness, orchid — is Bama's way of guiding drinkers into this depth."
    analogy_rules:
      - source_dimension: 焙火感/炒米香
        target_reference: "roasted warmth in medium-roast coffee"
        mapping_type: shared_sensory_reference
        confidence: medium
        note: "共享感官参照，但炒米香与咖啡烘焙香不完全等同"
      - source_dimension: 花香
        target_reference: "floral finish in washed coffee"
        mapping_type: shared_sensory_reference
        confidence: medium
        note: "入门类比，不等同于完全相同的风味物质"
    source_profile_id: flavor_szz_tgy_nx
    source_expression_id: expr_cn_szz_tgy_nx
    trace_id: expr_en_szz_tgy_nx_coffee

  # ===== 牛一大红袍——国内表达 =====
  - id: expr_cn_ny_wrt_dhp
    tea_id: BAMA_NY_WRT_DHP
    expression_type: domestic
    strategy_id: strategy_domestic_store_sales
    audience:
      age_group: gen_z
      knowledge_level: beginner
      scenario: self_drinking
      psychology: curiosity
    outputs:
      story_style: "牛一大红袍不是只有一股焦香。前段是焙火的温暖感，像烤坚果的香气；后面会慢慢透出花果香和回甘。喝完后整个口腔有一种持续的结构感，这就是我们说的岩韵。"
      scientific_style: "武夷岩茶的焙火是关键步骤。高温焙火促进吡嗪、吡咯和呋喃等烘焙香物质形成，同时也会改变茶氨酸等成分的组成。当前成分解释基于武夷岩茶品类研究，不代表牛一单品实测值。"
      emotional_style: "岩茶适合在需要专注的时刻喝。焙火的温暖感让人安心，花果香让它不沉闷，喝完后的回甘像是一种安静的陪伴。"
    source_profile_id: flavor_ny_wrt_dhp
    trace_id: expr_cn_ny_wrt_dhp
    source_expression_id: null

  # ===== 牛一大红袍——跨文化表达 =====
  - id: expr_en_ny_wrt_dhp_coffee
    tea_id: BAMA_NY_WRT_DHP
    expression_type: cross_cultural
    strategy_id: strategy_cross_cultural_coffee
    target_language: en
    market: western
    audience_reference: specialty_coffee_lovers
    outputs:
      literal_explanation: "Niuyi is Bama Tea's flagship Wuyi rock tea series. Da Hong Pao from this series offers roasted-nut warmth, layered floral-fruity notes, a full body, and a long structured finish."
      beginner_analogy: "Its roasting creates familiar nutty and caramel-like cues — shared heat-driven aroma pathways also known in roasted foods and coffee. Yet the tea remains more lifted, with floral notes and a returning sweetness rather than coffee's dense roast body."
      cultural_narrative: "Wuyi drinkers call its deeper structure Yan Yun. 'Yan' (rock) refers to terroir and the way aroma, texture and aftertaste hold together — not a literal taste of stone. It is the signature of tea grown in the Wuyi mountains, shaped by unique terrain and roasting craft."
    analogy_rules:
      - source_dimension: 焙火香/坚果香
        target_reference: "nutty and caramel-like roasting cues in dark-roasted coffee"
        mapping_type: shared_chemical_pathway
        confidence: medium
        note: "共享热反应路径，但整体风味不同；必须保留差异提醒"
      - source_dimension: 岩韵
        target_reference: "terroir concept in wine"
        mapping_type: narrative_bridge
        confidence: medium
        note: "帮助理解地域与风格关系，但茶的地域—品种—工艺关系有自身体系"
    source_profile_id: flavor_ny_wrt_dhp
    source_expression_id: expr_cn_ny_wrt_dhp
    trace_id: expr_en_ny_wrt_dhp_coffee

  # ===== 鼎红金骏眉——国内表达 =====
  - id: expr_cn_dh_bt_jjm
    tea_id: BAMA_DH_BT_JJM
    expression_type: domestic
    strategy_id: strategy_domestic_store_sales
    audience:
      age_group: gen_z
      knowledge_level: beginner
      scenario: self_drinking
      psychology: curiosity
    outputs:
      story_style: "鼎红金骏眉喝起来像走进春天的花园。干茶就有明显的花果香，冲泡后花蜜甜香扑面而来。入口甜润顺滑，几乎没有苦涩感，喝完后蜜甜和花香在嘴里延续很久。"
      scientific_style: "武夷红茶的花蜜甜香来自多种香气物质的共同塑造。研究识别出芳樟醇及氧化物、苯乙醇、苯乙醛、橙花醛等参与花蜜香。'全发酵'是行业习惯表达，科学上主要为酶促氧化。当前成分解释基于品类研究，非鼎红单品实测值。"
      emotional_style: "鼎红适合早上第一杯，或者下午需要一点甜感的时候。它不浓烈，更像是一种温柔的花蜜拥抱——不需要懂茶也能享受。"
    source_profile_id: flavor_dh_bt_jjm
    trace_id: expr_cn_dh_bt_jjm
    source_expression_id: null

  # ===== 鼎红金骏眉——跨文化表达 =====
  - id: expr_en_dh_bt_jjm_wine
    tea_id: BAMA_DH_BT_JJM
    expression_type: cross_cultural
    strategy_id: strategy_cross_cultural_coffee
    target_language: en
    market: western
    audience_reference: specialty_coffee_lovers
    outputs:
      literal_explanation: "Dinghong Jin Jun Mei is a premium bud-type black tea from the Wuyi mountains. It delivers a honeyed floral aroma, ripe-fruit sweetness, and a smooth, clean finish."
      beginner_analogy: "Approach it as you would an aromatic wine: notice the floral top notes first, honeyed fruit in the middle, and the length of the finish — without assuming wine-like acidity or alcohol. The tea's sweetness is natural, not added."
      cultural_narrative: "Jin Jun Mei is kept as its Chinese name. It is a young tea by Chinese standards — developed in the early 2000s — yet it quickly became one of the most recognized black teas. The goal is not to rename the tea for the world, but to give first-time drinkers enough sensory anchors to enter its own tradition."
    analogy_rules:
      - source_dimension: 花蜜甜香
        target_reference: "honeyed floral / ripe fruit notes"
        mapping_type: shared_sensory_reference
        confidence: medium
        note: "八马官方描述与武夷红茶花蜜香研究一致"
      - source_dimension: 品饮结构
        target_reference: "wine-like aromatic progression (aroma→palate→finish)"
        mapping_type: narrative_bridge
        confidence: medium
        note: "借用前中后段品饮结构，必须说明茶无酒精、酸度结构不同"
    source_profile_id: flavor_dh_bt_jjm
    source_expression_id: expr_cn_dh_bt_jjm
    trace_id: expr_en_dh_bt_jjm_wine


