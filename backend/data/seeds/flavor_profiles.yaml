        value_type: category_proxy
        description: "武夷岩茶研究显示咖啡碱约19–23 mg/g，不同焙火处理下变化<20%（Liu 2021）"
      - name: 茶氨酸
        value_type: category_proxy
        description: "中度与充分焙火后下降约52%–80%（Liu 2021），焙火对游离氨基酸影响明显强于对咖啡碱的影响"
      - name: 焙火路径
        value_type: process_proxy
        description: "高温焙火促进吡嗪、吡咯、呋喃等烘焙香物质形成（Zhan 2023）；不代表牛一实际焙火温度"

