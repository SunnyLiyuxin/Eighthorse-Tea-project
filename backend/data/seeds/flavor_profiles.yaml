# 风味坐标（第 2 层：风味结构化层）
# 三款茶各一套风味坐标，共享同一套观察维度
# intensity: 0-10（demo_estimate，非实测值）
# dimensions 带 label_zh / label_en，雷达图按语言取标签

flavor_profiles:
  # ===== 赛珍珠铁观音 =====
  - profile_id: flavor_szz_tgy_nx
    tea_id: BAMA_SZZ_TGY_NX
    dimensions:
      - key: dry_leaf_aroma
        label_zh: 干茶香气
        label_en: Dry Leaf Aroma
        intensity: 7
        description: "炒米香、焙火温暖感；花香线索"
        value_type: demo_estimate
        not_measurement: true
        calibration_status: pending_blind_tasting
        evidence_ids: ["evidence_bama_prospectus_flavor"]
      - key: infusion_aroma
        label_zh: 茶汤香气
        label_en: Infusion Aroma
        intensity: 8
        description: "果甜香、兰花样花香"
        value_type: demo_estimate
        not_measurement: true
        calibration_status: pending_blind_tasting
        evidence_ids: ["evidence_bama_prospectus_flavor", "evidence_wang_2023_oolong"]
      - key: floral
        label_zh: 花香
        label_en: Floral
        intensity: 8
        description: "以兰花香为代表的清雅花香"
        value_type: demo_estimate
        not_measurement: true
        calibration_status: pending_blind_tasting
        evidence_ids: ["evidence_tea_flavor_wheel_2022", "evidence_wang_2023_oolong"]
      - key: sweetness
        label_zh: 甜感
        label_en: Sweetness
        intensity: 6
        description: "果甜香与回甘共同构成甜感体验"
        value_type: demo_estimate
        not_measurement: true
        calibration_status: pending_blind_tasting
        evidence_ids: ["evidence_bama_prospectus_flavor"]
      - key: body
        label_zh: 醇厚度
        label_en: Body
        intensity: 7
        description: "甘醇、较圆润"
        value_type: demo_estimate
        not_measurement: true
        calibration_status: pending_blind_tasting
        evidence_ids: ["evidence_public_oolong_components"]
      - key: astringency
        label_zh: 收敛感
        label_en: Astringency
        intensity: 4
        description: "适度涩感"
        value_type: demo_estimate
        not_measurement: true
        calibration_status: pending_blind_tasting
        evidence_ids: ["evidence_public_oolong_components"]
      - key: roasted
        label_zh: 焙火感
        label_en: Roasted Note
        intensity: 5
        description: "焙火带来的烘焙香与醇厚感"
        value_type: demo_estimate
        not_measurement: true
        calibration_status: pending_blind_tasting
        evidence_ids: ["evidence_wang_2023_oolong"]
      - key: finish
        label_zh: 回甘与尾韵
        label_en: Lingering Finish
        intensity: 8
        description: "回甘、花香留存、音韵"
        value_type: demo_estimate
        not_measurement: true
        calibration_status: pending_blind_tasting
        evidence_ids: ["evidence_tea_flavor_wheel_2022", "evidence_gbt19598_2025"]
    component_notes:
      - name: 氨基酸
        value_type: typical_range
        description: "Demo 阶段采用公开文献中的乌龙茶典型范围，不代表八马单品实测值"
      - name: 咖啡碱
        value_type: category_proxy
        description: "42个商业乌龙茶样本均值25.98 mg/g，范围0–147.47（Chen 2023）"

